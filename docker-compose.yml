
---
include:
 - docker-compose-traefik.yml
 - docker-compose-authentik.yml

services:
  web:
    build:
      context: .
      dockerfile: web.Dockerfile
    image: flowcaseweb/flowcase
    container_name: flowcase-web
    restart: unless-stopped
    volumes:
      - flowcase-data:/flowcase/data
      - flowcase-nginx-data:/flowcase/nginx
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=0
    networks:
      - default_network
    # command: python run.py
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --threads 4 --worker-class=gthread --access-logfile - --error-logfile - wsgi:app --preload --timeout 120

  web-headers:
    build:
      context: .
      dockerfile: web.Dockerfile
    image: flowcaseweb/flowcase
    container_name: flowcase-web-headers
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_APP=run_headers.py
      - FLASK_DEBUG=0
    networks:
      - default_network
    # command: python run_headers.py
    command: gunicorn --bind 0.0.0.0:5000 --workers 1 --threads 2 --worker-class=gthread --access-logfile - --error-logfile - wsgi_headers:app --preload --timeout 120

  nginx:
    image: nginx:1.28-alpine
    container_name: flowcase-nginx
    restart: unless-stopped
    volumes:
      - flowcase-nginx-data:/etc/nginx/conf.d
    # ports:
    #  - "80:80"
    depends_on:
      - web
      - web-headers
    labels:
      - traefik.enable=true
      - traefik.http.routers.flowcase.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.flowcase.entrypoints=websecure
      - traefik.http.routers.flowcase.tls.certresolver=acme-resolver
      - traefik.http.services.flowcase.loadbalancer.server.port=80
      # enable middleware to add authentication by authentik
      - traefik.http.routers.flowcase.middlewares=authentik@file
      - traefik.docker.network=proxy_network
    networks:
      - default_network
      - proxy_network

networks:
  default_network:
    driver: bridge

volumes:
  flowcase-data:
    external: false
  flowcase-nginx-data:
    external: false
